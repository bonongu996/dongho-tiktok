        body {
            background-color: transparent;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #uptime {
            font-family: 'DS-Digital-Embedded', sans-serif; /* Gọi tên font đã nhúng */
            font-size: 90px;
            font-weight: bold;      
            font-style: italic;    
            color: #FF0000;         /* Bạn có thể đổi màu chữ tại đây */

<body>
    <div id="uptime">00:00:00</div>

    <script>
    let seconds = 0, minutes = 0, hours = 0;
    let timerInterval = null;

    function updateTimer() {
        seconds++;
        if (seconds >= 60) { seconds = 0; minutes++; }
        if (minutes >= 60) { minutes = 0; hours++; }
        let h = hours < 10 ? "0" + hours : hours;
        let m = minutes < 10 ? "0" + minutes : minutes;
        let s = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("uptime").innerText = h + ":" + m + ":" + s;
    }

    function startClock() {
        clearInterval(timerInterval); // Xóa bộ đếm cũ nếu có
        seconds = 0; minutes = 0; hours = 0;
        document.getElementById("uptime").innerText = "00:00:00";
        timerInterval = setInterval(updateTimer, 1000);
    }

    window.onload = startClock;
    </script>
</body>
